spring.application.name=task-processor
server.port=8080

spring.datasource.url=jdbc:sqlite:database/task_processor.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

spring.thymeleaf.cache=false

app.jwt.secret=change-this-secret-to-a-long-random-value-for-production
app.jwt.expiration-seconds=86400
app.task.worker-count=4
app.task.default-timeout-ms=15000
